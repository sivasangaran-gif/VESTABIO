<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VestaBio | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { dark: '#030712', accent: '#14B8A6' }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b 0%, #030712 100%) no-repeat center center fixed;
            color: #F8FAFC;
        }

        .glass {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.4);
        }

        .input-glass {
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid rgba(51, 65, 85, 0.8);
            color: white;
            transition: all 0.3s;
        }

        .input-glass:focus {
            outline: none;
            border-color: #14B8A6;
            box-shadow: 0 0 10px rgba(20, 184, 166, 0.2);
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(20, 184, 166, 0.6);
        }

        .btn-premium {
            background: linear-gradient(90deg, #0D9488 0%, #14B8A6 100%);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="antialiased flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-md p-10 rounded-3xl relative overflow-hidden group text-center">
        <!-- Glow effect -->
        <div
            class="absolute -right-16 -top-16 w-32 h-32 bg-teal-500/20 rounded-full blur-3xl group-hover:bg-teal-500/30 transition duration-700">
        </div>
        <div
            class="absolute -left-16 -bottom-16 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl group-hover:bg-blue-500/30 transition duration-700">
        </div>

        <div class="relative z-10">
            <h2 class="text-4xl font-extrabold tracking-wide text-white flex items-center justify-center gap-3 mb-2">
                <div class="p-2 rounded-xl bg-teal-500/20 shadow-[0_0_15px_rgba(20,184,166,0.3)]">
                    <svg class="w-8 h-8 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                Vesta<span class="text-teal-400 text-glow">Bio</span>
            </h2>
            <p class="text-slate-400 text-sm tracking-widest uppercase font-semibold mb-8">Identity Verification Context
            </p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl mb-6 text-sm">{{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" id="loginForm" class="space-y-4">
                <input type="email" name="email" placeholder="Email Address" required
                    class="input-glass w-full px-5 py-4 rounded-xl text-lg placeholder-slate-500">
                <input type="password" name="password" placeholder="Password" required
                    class="input-glass w-full px-5 py-4 rounded-xl text-lg placeholder-slate-500">

                <button type="submit"
                    class="w-full btn-premium tracking-wide text-white font-bold py-4 rounded-xl shadow-lg border border-teal-400/30 mt-4 text-lg">
                    Initialize Engine
                </button>
            </form>

            <p class="mt-8 text-sm text-slate-500 font-light">
                New identity? <a href="/register"
                    class="text-teal-400 hover:text-teal-300 transition-colors border-b border-teal-400/30 hover:border-teal-300 pb-0.5">Register
                    baseline</a>
            </p>
        </div>
    </div>

</body>

</html>
