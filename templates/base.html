<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VestaBio | Metabolic Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0F172A;
            --bg-surface: #1E293B;
            --teal-accent: #14B8A6;
            --teal-hover: #0D9488;
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
        }

        /* Navigation */
        nav {
            background-color: var(--bg-surface);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-light);
            text-decoration: none;
            letter-spacing: 1px;
        }
        .brand span { color: var(--teal-accent); }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--teal-accent); }

        /* Container & Grid */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        /* Cards & UI Elements */
        .card {
            background: var(--bg-surface);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
        }
        .card-title {
            color: var(--teal-accent);
            margin-top: 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Forms & Buttons */
        .btn {
            background-color: var(--teal-accent);
            color: var(--bg-dark);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn:hover { background-color: var(--teal-hover); }
        .btn-danger { background-color: var(--danger); color: white; }
        
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background-color: var(--bg-dark);
            border: 1px solid #334155;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Alerts */
        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            background-color: #334155;
        }
        .alert-danger { border-left: 4px solid var(--danger); }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="brand">Vesta<span>Bio</span></a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <span>{{ current_user.email }}</span>
                <a href="{{ url_for('logout') }}">Secure Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% end}
